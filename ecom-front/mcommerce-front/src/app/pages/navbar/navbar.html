<!-- NAVBAR -->
<div class="navbar">
  <a
  class="logo"
  routerLink="/products"
>
   <i class="fa-solid fa-guitar">Guitara</i>
</a>

  <div class="nav-actions">

    <!-- CART -->
    <a
  routerLink="/cart"
  class="icon-btn cart-btn"
  title="Panier"
>
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 
    0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.2 
    14h9.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49-1.74-.99-3.58 
    6.48H7.42L6.27 4H2v2h3l3.6 7.59-1.35 2.44C6.52 
    16.37 6.96 17 7.7 17H19v-2H7.7l.5-1z"/>
  </svg>

  <span class="cart-count" *ngIf="cartCount > 0">
    {{ cartCount }}
  </span>
</a>

    <!-- PROFILE -->
    <a
      routerLink="/profile"
      class="icon-btn profile-btn"
      title="Mon profil"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 
        2.3-5 5 2.3 5 5 5zm0 2c-3.3 
        0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
      </svg>
    </a>

    <!-- LOGOUT -->
    <button
      class="icon-btn logout-btn"
      title="Déconnexion"
      (click)="logout()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 
        1.41L12.67 11H3v2h9.67l-2.58 
        2.59zM19 3H5c-1.11 0-2 .9-2 
        2v4h2V5h14v14H5v-4H3v4c0 
        1.1.89 2 2 2h14c1.11 0 2-.9 
        2-2V5c0-1.1-.89-2-2-2z"/>
      </svg>
    </button>

  </div>
</div>
