# ===============================
# Server
# ===============================
server.port=8083
spring.application.name=payment-service

# ===============================
# Eureka
# ===============================
eureka.client.serviceUrl.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.preferIpAddress=true

# ===============================
# PostgreSQL (payment-service DB)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,info,refresh
management.info.env.enabled=true

# ===============================
# Custom config
# ===============================
mes-config-ms.payment-last=3

# ===============================
# Info actuator
# ===============================
info.app.name=payment-service
info.app.description=Microservice de paiement
info.app.version=1.0.0
info.payment.last=${mes-config-ms.payment-last}
